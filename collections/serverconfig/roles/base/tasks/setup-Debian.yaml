---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - base_packages_common is defined
      - base_packages_debian is defined
      - hostname is defined
      - server_environment is defined
    fail_msg: "Required variables are not defined. Please check your playbook."

- name: Update apt cache and upgrade dist
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install common base packages
  ansible.builtin.apt:
    name: "{{ base_packages_common + base_packages_debian }}"
    state: present

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}-{{ server_environment }}"

- name: Enable automatic updates (debconf)
  ansible.builtin.debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    vtype: boolean
    value: true

- name: Configure Unattended-Upgrades templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/apt/apt.conf.d/{{ item }}"
    mode: '0644'
  loop:
    - 50unattended-upgrades
    - 20auto-upgrades
  notify: Restart Unattended-Upgrades


- name: Configure Logrotate for Sudo
  ansible.builtin.template:
    src: sudo_logrotate.j2
    dest: /etc/logrotate.d/sudo
    mode: '0644'

- name: Harden SSH Configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?Port', line: "Port {{ ssh_port }}" }
    - { regexp: '^#?PermitRootLogin', line: "PermitRootLogin prohibit-password" } # Only keys for root
    - { regexp: '^#?PasswordAuthentication', line: "PasswordAuthentication no" } # Kill passwords
    - { regexp: '^#?MaxAuthTries', line: "MaxAuthTries 3" } # Stop brute force early
    - { regexp: '^#?AllowAgentForwarding', line: "AllowAgentForwarding no" }
  notify: Restart SSH

- name: Apply Container-Optimized Kernel Hardening
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    # Use '2' (Loose) for rp_filter if using K8s/Docker bridge networking
    - { key: 'net.ipv4.conf.all.rp_filter', value: '2' }
    - { key: 'net.ipv4.conf.default.rp_filter', value: '2' }
    
    # Enable IP Forwarding (REQUIRED for Docker/K8s)
    - { key: 'net.ipv4.ip_forward', value: '1' }
    - { key: 'net.ipv6.conf.all.forwarding', value: '1' }
    
    # Bridge Netfilter (Required for K8s to see bridged traffic)
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
- name: Configure Fail2Ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: '0644'
  notify: Restart Fail2Ban

- name: Deploy and permission aliases.sh
  ansible.builtin.copy:
    src: aliases.sh
    dest: /etc/profile.d/aliases.sh
    mode: '0755'

- name: Verify SSH connectivity on custom port
  ansible.builtin.wait_for:
    port: "{{ ssh_port }}"
    host: "{{ inventory_hostname }}"
    search_regex: OpenSSH
    timeout: 5
  delegate_to: localhost
  become: false