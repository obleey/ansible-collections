# List of mounts to add to fstab and mount.
# Each entry can be NFS, CIFS, or any other fstab fstype.
#
# NFS example:
# mount_entries:
# mount_entries:
#   - path: /mnt/nfs_data
#     src: nfs-server.example.com:/export/data
#     fstype: nfs4
#     opts: defaults,rw,soft
#     state: mounted
#
# CIFS example (set credentials file per host/group_vars):
# mount_entries:
#    - path: /mnt/cifs_share
#      src: //fileserver.example.com/share
#      fstype: cifs
#      opts: credentials=/etc/smb-credentials.txt,uid=1000,gid=1000,file_mode=0644,dir_mode=0755
#
mount_entries: []
